<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Giriş</title>
  <style>
    :root{--bg:#0f0f0f;--card:rgba(20,20,20,.88);--text:#f5f5f5;--muted:#cfcfcf;--b:rgba(255,120,0,.25);--ring:rgba(255,120,0,.35);--a:#ff7a00;--a2:#ff3c00;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text);font-family:Segoe UI, sans-serif;padding:20px}
    .card{width:min(420px,100%);background:var(--card);border:1px solid var(--b);border-radius:18px;padding:22px;box-shadow:0 0 40px rgba(255,120,0,.18)}
    h2{margin:0 0 14px}
    label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}
    input{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--b);background:rgba(0,0,0,.35);color:var(--text);outline:none}
    input:focus{box-shadow:0 0 0 3px var(--ring)}
    button{width:100%;margin-top:16px;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--a),var(--a2));color:white;font-weight:700;cursor:pointer}
    .msg{margin:10px 0 0;padding:10px;border-radius:12px;border:1px solid rgba(255,120,0,.3);background:rgba(255,120,0,.08)}
  </style>
</head>
<body>
  <div class="card">
    <h2>CNC Verim Sistemi</h2>

    {% if message %}
      <div class="msg">{{ message }}</div>
    {% endif %}

    <form method="post">
      <label>Kullanıcı Adı</label>
      <input name="username" autocomplete="username" required>

      <label>Şifre</label>
      <input name="password" type="password" autocomplete="current-password" required>

      <button type="submit">Giriş</button>
    </form>
  </div>
</body>
</html>
